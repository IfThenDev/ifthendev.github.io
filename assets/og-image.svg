<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAF8F4"/>
  <g font-family="Inter, -apple-system, sans-serif">
    <!-- bracket mark + wordmark, optical centering, baseline ~285 -->
    <text x="600" y="290" text-anchor="middle" font-size="120" font-weight="700" letter-spacing="-2" fill="#1A1814">
      <tspan fill="#E85D1A" letter-spacing="6">{ }</tspan>
      <tspan dx="22">IfThenDev</tspan>
    </text>
    <!-- tagline -->
    <text x="600" y="380" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="38" font-weight="380" letter-spacing="-0.5" fill="#1A1814">
      A small catalog of independent iOS apps &#8212; since 2012.
    </text>
    <!-- subline -->
    <text x="600" y="445" text-anchor="middle" font-size="22" font-weight="400" fill="#5C574F" letter-spacing="0.2">
      Eleven titles. iPhone. iPad. Mac. Apple Watch. Vision Pro.
    </text>
  </g>
  <!-- 4px Bracket Orange rule at bottom — echoes the card accent strip -->
  <rect x="0" y="626" width="1200" height="4" fill="#E85D1A"/>
</svg>
