<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — If Then Dev</title>
<meta name="description" content="Get in touch with If Then Dev about any of our iOS apps. Email goes straight to help@ifthendev.com.">

<!-- SEO -->
<link rel="canonical" href="https://ifthendev.com/contact/">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="sitemap" type="application/xml" href="/sitemap.xml">

<!-- Open Graph / Twitter card -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="If Then Dev">
<meta property="og:title" content="Contact — If Then Dev">
<meta property="og:description" content="Get in touch about any of our iOS apps.">
<meta property="og:url" content="https://ifthendev.com/contact/">
<meta property="og:image" content="https://ifthendev.com/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="If Then Dev — A small catalog of independent iOS apps. Since 2012.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact — If Then Dev">
<meta name="twitter:description" content="Get in touch about any of our iOS apps.">
<meta name="twitter:image" content="https://ifthendev.com/assets/og-image.png">

<!-- Theme color -->
<meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14120E" media="(prefers-color-scheme: dark)">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="msapplication-TileImage" content="/mstile-270x270.png">

<link rel="stylesheet" href="/assets/css/site.css">
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<header class="header" id="site-header">
  <div class="header-inner">
    <a class="lockup" href="/" aria-label="If Then Dev — home">
      <span class="brackets">{ }</span><span>IfThenDev</span>
    </a>
    <nav class="header-nav" aria-label="Primary">
      <a href="/contact/" aria-current="page">Contact</a>
    </nav>
  </div>
</header>

<main id="main">

  <section class="hero" aria-labelledby="hero-title">
    <h1 id="hero-title">Contact</h1>
    <p class="hero-sub">Questions, feedback, or trouble with one of our apps? Send a note &mdash; it goes straight to <a href="mailto:help@ifthendev.com" style="color:inherit;border-bottom:1px solid currentColor;">help@ifthendev.com</a>.</p>
  </section>

  <section class="form-section" aria-labelledby="form-title">
    <h2 id="form-title" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;">Send a message</h2>

    <form class="form" id="contact-form">

      <div class="form-row">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
      </div>

      <div class="form-row">
        <label for="app">App</label>
        <select id="app" name="app">
          <option value="">Choose an app&hellip;</option>
          <option>QuickScan Book Leveler</option>
          <option>BookScanner Book Leveler App</option>
          <option>Bookshelf Scanner</option>
          <option>miSales Developer Sales Charts</option>
          <option>Monitor My Reviews</option>
          <option>Franciscan Pilgrimage</option>
          <option>PickleBoard</option>
          <option>Simple Soccer Scoreboard</option>
          <option>Quick Baseball Scoreboard</option>
          <option>Inside The Matrix Machine</option>
          <option>Virtris &mdash; Falling Blocks</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-row">
        <label for="body">Question or comment</label>
        <textarea id="body" name="body" placeholder="What's going on?"></textarea>
      </div>

      <button type="submit" class="form-submit">Send</button>

    </form>
  </section>

</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-meta">
      <span class="lockup"><span class="brackets">{ }</span><span>IfThenDev</span></span>
      <div>© 2012&ndash;<span class="copyright-year">2026</span> If Then Dev, LLC.</div>
    </div>
    <nav class="footer-links" aria-label="Footer">
      <a href="/privacy-policy/">Privacy Policy</a>
      <a href="/privacy-policy/#terms-and-conditions">Terms</a>
      <a href="/contact/">Contact</a>
    </nav>
  </div>
</footer>

<script>
  (function () {
    var header = document.getElementById('site-header');
    if (!header) return;
    var sync = function () {
      header.dataset.scrolled = (window.scrollY > 8) ? 'true' : 'false';
    };
    sync();
    window.addEventListener('scroll', sync, { passive: true });
  })();
  document.querySelectorAll('.copyright-year').forEach(function(e){e.textContent=new Date().getFullYear();});

  (function () {
    var form = document.getElementById('contact-form');
    if (!form) return;
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('name').value.trim();
      var app  = document.getElementById('app').value.trim();
      var body = document.getElementById('body').value.trim();
      var subject = app ? 'Question about ' + app : 'Question or Comment About App';
      var lines = [];
      if (name) lines.push('From: ' + name);
      if (app)  lines.push('App: ' + app);
      if (body) lines.push('', body);
      var href = 'mailto:help@ifthendev.com'
        + '?subject=' + encodeURIComponent(subject)
        + '&body='    + encodeURIComponent(lines.join('\n'));
      window.location.href = href;
    });
  })();
</script>

</body>
</html>
