# Deploy the static site to GitHub Pages on every push to main.
#
# This replaces GitHub's auto-generated Pages workflow so the deploy step can
# request the OIDC ID token that `actions/deploy-pages@v5` needs.
#
# Without `id-token: write`, the deployment step 401s with "Requires
# authentication" even when the artifact upload succeeds (see GitHub issue
# https://github.com/actions/deploy-pages/issues/329).

name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let any in-progress run finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo is the site (plain static HTML, no Jekyll build).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
